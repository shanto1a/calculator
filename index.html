<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Responsive Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>





    <div id="header">
        <h1 id="page_title">Area Calculator</h1>
    </div>

    <div class="content_box">
        <h2 class="content_title">Heron's Formula</h2>
        
        <div class="main_layout">
            <div class="text_box">
                <div class="input_group">
                    <label for="a">a =</label>
                    <input type="text" id="a" >
                </div>
                <div class="input_group">
                    <label for="b">b =</label>
                    <input type="text" id="b" >
                </div>
                <div class="input_group">
                    <label for="c">c =</label>
                    <input type="text" id="c" >
                </div>

                <button onclick="calculateArea()" class="action_btn">Calculate</button>

                <div class="results">
                    <p>Area = <span id="area">0.0000</span></p>
                    <p>in shotok = <span id="shotok">0.0000</span></p>
                    <p>in katha = <span id="katha">0.0000</span></p>
                </div>
            </div>

            <div class="img_box">
                <img src="images/triangle.svg" alt="triangle" class="responsive_img">
            </div>
        </div>
    </div>






<div class="content_box">
        <h2 class="content_title">Finding Angle using Cosine Rule</h2>
        
        <div class="main_layout">
            <div class="text_box">
                <div class="input_group">
                    <label for="a2">a =</label>
                    <input type="text" id="a2" >
                </div>
                <div class="input_group">
                    <label for="b2">b =</label>
                    <input type="text" id="b2" >
                </div>
                <div class="input_group">
                    <label for="c2">c =</label>
                    <input type="text" id="c2" >
                </div>

                <button onclick="calculateAngle()" class="action_btn">Calculate</button>

                <div class="results">
                    <p>Angle = <span id="angle">0.0000</span></p>
                    
                </div>
            </div>

            <div class="img_box">
                <img src="images/angle.svg" alt="triangle" class="responsive_img">
            </div>
        </div>
    </div>








<div class="content_box">
        <h2 class="content_title">Finding side 'b' of a triangle</h2>
        
        <div class="main_layout">
            <div class="text_box">
                <div class="input_group">
                    <label for="a3">a =</label>
                    <input type="text" id="a3" >
                </div>
                <div class="input_group">
                    <label for="angle3">angle C =</label>
                    <input type="text" id="angle3" >
                </div>
                <div class="input_group">
                    <label for="area3">area =</label>
                    <input type="text" id="area3" >
                </div>

                <button onclick="calculateBase()" class="action_btn">Calculate</button>

                <div class="results">
                    <p>side b = <span id="b3">0.0000</span></p>                 
                </div>
            </div>

            <div class="img_box">
                <img src="images/line_chasing.svg" alt="triangle" class="responsive_img">
            </div>
        </div>
    </div>







    <script>
        function calculateArea(){
		var a=getInputValue('a');
		var b=getInputValue('b');
		var c=getInputValue('c');
		if(isNaN(a) || isNaN(b) || isNaN(c)){
      alert('Please Enter Valid Values for a,b,c');
      return;
    }
    var s=(a+b+c)/2;
    var area_squared=s*(s-a)*(s-b)*(s-c);
    if (area_squared<0){alert('Trianlge is Unreal');}
    var area=Math.sqrt(area_squared);
    var shotok=area/435.6;
    var katha=area/720;
    setElementText('area',area.toFixed(4));
    setElementText('shotok',shotok.toFixed(4));
    setElementText('katha',katha.toFixed(4));
	}



    function calculateAngle(){
	  var a=getInputValue('a2');
		var b=getInputValue('b2');
		var c=getInputValue('c2');
		if(isNaN(a) || isNaN(b) || isNaN(c)){
      alert('Please Enter Valid Values for a,b,c');
      return;
    }
    var angle = Math.acos((a*a+b*b-c*c)/(2*a*b))/Math.PI*180;
    setElementText('angle',angle.toFixed(4))
	}



    function calculateBase(){
	  var a=getInputValue('a3');
		var area=getInputValue('area3');
		var C=getInputValue('angle3');
		if(isNaN(a) || isNaN(area) || isNaN(C) ){
      alert('Please Enter Valid Values for a,b,c');
      return;
		}
    var b=2*area/(a*Math.sin(C*Math.PI/180));
    setElementText('b3',b.toFixed(4));
	}


  function getInputValue(fieldId) {
    const inputField = document.getElementById(fieldId);
    const inputValueText = inputField.value;
    const value = parseFloat(inputValueText);
    return value;
  }


  function setElementText(elementId, text0) {
    const element = document.getElementById(elementId);
    element.innerText = text0;
  }



    </script>
</body>
</html>
